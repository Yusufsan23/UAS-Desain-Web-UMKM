<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Warung Makan Banyuwangi</title>
    <link href="src/output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <!-- Container Utama Animasi Zoom -->
    <main class="bg-white rounded-3xl shadow-2xl overflow-hidden flex w-full max-w-4xl" data-aos="zoom-in"
        data-aos-duration="800">

        <!-- Bagian Gambar -->
        <section
            class="hidden md:flex md:w-1/2 bg-gradient-to-br from-red-600 to-orange-500 p-12 flex-col justify-center items-center text-center relative overflow-hidden"
            data-aos="fade-right" data-aos-delay="300">
            <h2 class="text-3xl font-bold text-white mb-4 relative z-10">Selamat Datang Kembali!</h2>
            <p class="text-red-100 relative z-10">Silakan login untuk mengelola menu dan pesanan Delish Cwie Mie.</p>
        </section>

        <!-- Bagian Form -->
        <section class="w-full md:w-1/2 p-10 lg:p-14 flex flex-col justify-center" data-aos="fade-left"
            data-aos-delay="500">
            <div class="mb-10">
                <h3 class="text-2xl font-bold text-gray-800">Admin Login</h3>
                <p class="text-gray-500 text-sm mt-1">Masukkan kredensial Anda</p>
            </div>

            <form action="dashboard.html" method="GET">
                <div class="mb-5">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Username</label>
                    <input type="text" required
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent transition"
                        placeholder="admin@warung.com">
                </div>
                <div class="mb-8">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                    <input type="password" required
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent transition"
                        placeholder="••••••••">
                </div>

                <button type="submit"
                    class="w-full bg-gradient-to-r from-red-600 to-orange-500 text-white font-bold py-3 rounded-xl hover:shadow-lg transform hover:-translate-y-1 transition duration-300">
                    Masuk ke Dashboard
                </button>
            </form>

            <div class="mt-6 text-center">
                <a href="index.html" class="text-sm text-orange-600 font-medium hover:underline">&larr; Kembali ke
                    Beranda</a>
            </div>
        </section>

    </main>

    <!-- AOS JS & Init -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true });
    </script>
</body>

</html>
