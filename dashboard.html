<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Warung Makan Banyuwangi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50">

    <!-- Navbar Admin -->
    <header class="bg-white shadow-sm border-b border-gray-200">
        <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-16">
            <h1 class="text-xl font-bold text-red-700">Panel Admin</h1>
            <a href="index.html" class="text-sm font-semibold text-gray-500 hover:text-red-600 transition">Logout</a>
        </nav>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">

        <div class="flex justify-between items-center mb-8" data-aos="fade-down">
            <div>
                <h2 class="text-2xl font-bold text-gray-800">Kelola Menu</h2>
                <p class="text-sm text-gray-500">Atur ketersediaan dan harga makanan.</p>
            </div>
            <button
                class="bg-gradient-to-r from-red-600 to-orange-500 text-white px-4 py-2 rounded-lg font-semibold hover:shadow-md transition">+
                Tambah Data</button>
        </div>

        <!-- Tabel Data Responsif -->
        <section class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden" data-aos="fade-up"
            data-aos-delay="200">
            <div class="overflow-x-auto w-full">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr
                            class="bg-gray-100 text-gray-600 text-xs sm:text-sm uppercase tracking-wide border-b border-gray-200">
                            <th class="hidden sm:table-cell px-3 py-3 sm:px-6 sm:py-4 font-semibold">ID</th>
                            <th class="px-3 py-3 sm:px-6 sm:py-4 font-semibold">Nama Makanan</th>
                            <th class="px-3 py-3 sm:px-6 sm:py-4 font-semibold">Harga</th>
                            <th class="px-3 py-3 sm:px-6 sm:py-4 font-semibold text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody class="text-gray-700">
                        <tr class="border-b border-gray-100 hover:bg-gray-50 transition">
                            <td class="hidden sm:table-cell px-3 py-3 sm:px-6 sm:py-4 font-mono text-xs sm:text-sm">
                                #WMB-01</td>
                            <td class="px-3 py-3 sm:px-6 sm:py-4 font-semibold text-xs sm:text-sm">Cwi Mie Original</td>
                            <td class="px-3 py-3 sm:px-6 sm:py-4 text-orange-600 font-bold text-xs sm:text-sm">Rp 6.000
                            </td>
                            <td class="px-3 py-3 sm:px-6 sm:py-4">
                                <div class="flex flex-col sm:flex-row justify-center gap-1 sm:gap-2">
                                    <button
                                        class="bg-blue-100 text-blue-700 px-2 py-1.5 sm:px-3 sm:py-1 rounded text-[10px] sm:text-xs font-bold hover:bg-blue-200">Edit</button>
                                    <button
                                        class="bg-red-100 text-red-700 px-2 py-1.5 sm:px-3 sm:py-1 rounded text-[10px] sm:text-xs font-bold hover:bg-red-200">Hapus</button>
                                </div>
                            </td>
                        </tr>
                        <tr class="border-b border-gray-100 hover:bg-gray-50 transition">
                            <td class="hidden sm:table-cell px-3 py-3 sm:px-6 sm:py-4 font-mono text-xs sm:text-sm">
                                #WMB-02</td>
                            <td class="px-3 py-3 sm:px-6 sm:py-4 font-semibold text-xs sm:text-sm">Cwi Mie Chili Oil
                            </td>
                            <td class="px-3 py-3 sm:px-6 sm:py-4 text-orange-600 font-bold text-xs sm:text-sm">Rp 8.000
                            </td>
                            <td class="px-3 py-3 sm:px-6 sm:py-4">
                                <div class="flex flex-col sm:flex-row justify-center gap-1 sm:gap-2">
                                    <button
                                        class="bg-blue-100 text-blue-700 px-2 py-1.5 sm:px-3 sm:py-1 rounded text-[10px] sm:text-xs font-bold hover:bg-blue-200">Edit</button>
                                    <button
                                        class="bg-red-100 text-red-700 px-2 py-1.5 sm:px-3 sm:py-1 rounded text-[10px] sm:text-xs font-bold hover:bg-red-200">Hapus</button>
                                </div>
                            </td>
                        </tr>
                        <tr class="border-b border-gray-100 hover:bg-gray-50 transition">
                            <td class="hidden sm:table-cell px-3 py-3 sm:px-6 sm:py-4 font-mono text-xs sm:text-sm">
                                #WMB-03</td>
                            <td class="px-3 py-3 sm:px-6 sm:py-4 font-semibold text-xs sm:text-sm">Es Teh</td>
                            <td class="px-3 py-3 sm:px-6 sm:py-4 text-orange-600 font-bold text-xs sm:text-sm">Rp 5.000
                            </td>
                            <td class="px-3 py-3 sm:px-6 sm:py-4">
                                <div class="flex flex-col sm:flex-row justify-center gap-1 sm:gap-2">
                                    <button
                                        class="bg-blue-100 text-blue-700 px-2 py-1.5 sm:px-3 sm:py-1 rounded text-[10px] sm:text-xs font-bold hover:bg-blue-200">Edit</button>
                                    <button
                                        class="bg-red-100 text-red-700 px-2 py-1.5 sm:px-3 sm:py-1 rounded text-[10px] sm:text-xs font-bold hover:bg-red-200">Hapus</button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <!-- AOS JS & Init -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true });
    </script>
</body>

</html>
